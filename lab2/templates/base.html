<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Корпусный менеджер - Досуг{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .concordance-left { text-align: right; color: #666; }
        .concordance-center { text-align: center; font-weight: bold; color: #d9534f; }
        .concordance-right { text-align: left; color: #666; }
        .pos-tag { font-size: 0.8em;  font-style: italic; }
        .lemma { color: #08141e; }
        .help-icon { cursor: help; color: #030913; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-secondary">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('index') }}">Корпус "Досуг"</a>
            <div class="navbar-nav me-auto">
                <a class="nav-link" href="{{ url_for('index') }}">Главная</a>
                <a class="nav-link" href="{{ url_for('upload') }}">Загрузить</a>
                <a class="nav-link" href="{{ url_for('search') }}">Поиск</a>
                <a class="nav-link" href="{{ url_for('concordance') }}">Конкорданс</a>
                <a class="nav-link" href="{{ url_for('statistics') }}">Статистика</a>
            </div>
            <div class="navbar-nav">
                <a class="nav-link" href="{{ url_for('help_page') }}">
                    <i class="bi bi-question-circle"></i> Помощь
                </a>
            </div>
        </div>
    </nav>
    
    <div class="container mt-4">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }} alert-dismissible fade show">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        {% block content %}{% endblock %}
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
