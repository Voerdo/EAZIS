{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-md-10 offset-md-1">
        <h2>Редактирование документа</h2>
        
        <form method="POST">
            <div class="mb-3">
                <label for="title" class="form-label">Название документа</label>
                <input type="text" class="form-control" id="title" name="title" 
                       value="{{ doc.title }}" required>
            </div>
            
            <div class="mb-3">
                <label for="content" class="form-label">Содержание</label>
                <textarea class="form-control" id="content" name="content" 
                          rows="15" required>{{ doc.content }}</textarea>
                <div class="form-text">
                    При сохранении текст будет автоматически переразмечен.
                </div>
            </div>
            
            <button type="submit" class="btn btn-success">Сохранить изменения</button>
            <a href="{{ url_for('view_document', doc_id=doc.id) }}" class="btn btn-secondary">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
